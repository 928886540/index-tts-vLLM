<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IndexTTS TAVO Bridge Test</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #121318;
      color: #f1f3f7;
    }
    body {
      margin: 0;
      padding: 24px;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 650;
      margin: 0 0 16px;
    }
    #chat {
      display: grid;
      gap: 12px;
    }
    .mes {
      border: 1px solid #2a2d38;
      background: #1a1d25;
      border-radius: 8px;
      padding: 12px;
    }
    .name {
      font-size: 12px;
      color: #9aa4b2;
      margin-bottom: 6px;
    }
    .mes_text {
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .hint {
      margin-top: 18px;
      color: #9aa4b2;
      font-size: 13px;
    }
    audio {
      max-height: 34px;
    }
  </style>
</head>
<body>
  <main>
    <h1>IndexTTS TAVO Bridge Test</h1>
    <section id="chat">
      <article class="mes">
        <div class="name">system</div>
        <div class="mes_text">[TTS]深夜的雨打在玻璃上。小明压低声音说：“你怎么还不睡？”小红轻轻喘了一口气：“我在等你回来。”[/TTS]</div>
      </article>
      <article class="mes">
        <div class="name">assistant</div>
        <div class="mes_text">&lt;tts&gt;旁白：走廊尽头的灯忽明忽暗。小明：别怕，我在这里。&lt;/tts&gt;</div>
      </article>
    </section>
    <p class="hint">打开右下角设置按钮，配置 default/narrator/人物音色和可选 LLM。页面会注入轻量音频卡；只有点击卡片播放按钮后才会触发语音生成。</p>
  </main>
  <script src="./tavo.js"></script>
</body>
</html>
